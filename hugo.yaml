baseURL: 'https://man-in-the-mirror-05.github.io/'
languageCode: 'en-us'
title: "Man in the Mirror"
theme: PaperMod

enableInlineShortcodes: true # shortcode，类似于模板变量，可以在写 markdown 的时候便捷地插入，官方文档中有一个视频讲的很通俗
hasCJKLanguage: true # 是否有 CJK 的字符
enableRobotsTXT: true # 允许生成 robots.txt
buildDrafts: false # 构建时是否包括草稿
buildFuture: true # 构建未来发布的内容
buildExpired: false # 构建过期的内容
enableEmoji: true # 允许 emoji
pygmentsUseClasses: true
defaultContentLanguage: zh # 顶部首先展示的语言界面
defaultContentLanguageInSubdir: false # 是否要在地址栏加上默认的语言代码


languages:
  zh:
    languageName: "English" # 展示的语言名
    weight: 1 # 权重
    taxonomies: # 分类系统
      tag: tags
    # https://gohugo.io/content-management/menus/#define-in-site-configuration
    menus:
      main:
        - identifier: posts
          name: Posts
          url: /posts/
          weight: 10
        - identifier: archive
          name: Archive
          url: /archive/
          weight: 20
        - identifier: search
          name: Search
          url: /search/
          weight: 30
        - identifier: tags
          name: Tags
          url: /tags/
          weight: 40
        - identifier: faq
          name: FAQ
          url: /about/
          weight: 50


params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "Theme PaperMod - https://github.com/adityatelange/hugo-PaperMod"
  author: Man in the Mirror
  defaultTheme: light # 默认是暗色背景
  ShowShareButtons: false # 关闭分享的按钮
  ShowReadingTime: true # 展示预估的阅读时长
  displayFullLangName: true # 展示全名
  ShowPostNavLinks: true # 展示文章导航链接，就是下一页上一页的那个
  ShowBreadCrumbs: false # 是否展示标题上方的面包屑
  ShowCodeCopyButtons: true # 是否展示复制代码的按钮
  ShowRssButtonInSectionTermList: true # RSS 相关
  ShowAllPagesInArchive: true # 在归档页面展示所有的页面
  ShowPageNums: true # 展示页面的页数
  ShowToc: true # 展示文章详情页的目录
  comments: true # 评论
  images: ["https://i.postimg.cc/7hwBy7VS/calcr.png"] # 缺省的图片，比如，博客的封面
  DateFormat: "2006-01-02" # 这个时间是作者自己写的，只能这样写



    # 首页的文章上方的一些信息
  homeInfoParams:
    # 首页的 profile 内容
    Title: "Hi!👋 I'm Man in the Mirror."
    # 首页的 profile 内容
    Content: >
      Hi, this is Man in the Mirror. I’ve been writing since 2024.
  # 社交帐号的按钮
  socialIcons:
    - name: github
      title: Follow my Github
      url: "https://github.com/Man-in-the-Mirror-05/"
    - name: Bilibili
      title: 关注我的 B 站帐号
      url: "https://space.bilibili.com/3494359097936386"
    - name: Douban
      title: 关注我的豆瓣帐号
      url: "https://www.douban.com/people/275271169/"


  # 搜索
  fuseOpts:
    isCaseSensitive: false # 是否大小写敏感
    shouldSort: true # 是否排序
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    # limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
    includeMatches: true

  # 设置网站的标签页的图标，即 favicon
  assets:
      favicon: "favicon_wine.ico"
      favicon16x16: "favicon_wine.ico"
      favicon32x32: "favicon_wine.ico"
      apple_touch_icon: "favicon_wine.ico"
      safari_pinned_tab: "favicon_wine.ico"
      disableHLJS: true
  


  # 版权信息
  copyright: "[©2025 Man in the Mirror's Site](https://man-in-the-mirror-05.github.io/)"


outputs:
  home:
    - HTML # 生成的静态页面
    - RSS # 这个其实无所谓
    - JSON # necessary for search, 这里的配置修改好之后，一定要重新生成一下


markup:
  goldmark:
    renderer:
      unsafe: true # 可以 unsafe，有些 html 标签和样式可能需要
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - ['$$', '$$']
          inline:
            - ['$', '$']
  highlight:
    anchorLineNos: false # 不要给行号设置锚标
    codeFences: true # 代码围栏
    noClasses: false # TODO: 不知道干啥的，暂时没必要了解，不影响展示
    lineNos: true # 代码行
    lineNumbersInTable: false # 不要设置成 true，否则如果文章开头是代码的话，摘要会由一大堆数字(即代码行号)开头文章
    # 这里设置 style 没用，得自己加 css
    # style: "github-dark"
    # style: monokai